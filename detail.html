<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detail nemovitosti | Kamila Kopřivová</title>

<meta name="description" content="Detail nabídky nemovitosti Ing. Kamily Kopřivové v Olomouckém kraji.">
<meta name="keywords" content="detail nemovitosti Olomouc, realitní makléřka Olomouc, Kamila Kopřivová, prodej nemovitosti, pronájem nemovitosti">
<meta name="author" content="Ing. Kamila Kopřivová">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#121b3f">

<link rel="canonical" href="https://kamila-self.vercel.app/detail">

<meta property="og:title" content="Detail nemovitosti | Kamila Kopřivová">
<meta property="og:description" content="Detail nabídky nemovitosti Ing. Kamily Kopřivové.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kamila-self.vercel.app/detail">
<meta property="og:image" content="https://kamila-self.vercel.app/images/IMG_1007.png">
<meta property="og:locale" content="cs_CZ">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Detail nemovitosti | Kamila Kopřivová">
<meta name="twitter:description" content="Detail nabídky nemovitosti v Olomouckém kraji.">
<meta name="twitter:image" content="https://kamila-self.vercel.app/images/IMG_1007.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
--white:#ffffff;
--soft:#f7f5f0;
--gold:#c8ab72;
--gold-light:#eadcc0;
--navy:#121b3f;
--text:#2d2d2d;
--muted:#777;
--border:#ece6da;
--hero-image:url("https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1600&auto=format&fit=crop");
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
font-family:"Montserrat",sans-serif;
background:white;
color:var(--text);
line-height:1.7;
overflow-x:hidden;
opacity:0;
animation:pageLoad .8s ease forwards;
}

@keyframes pageLoad{from{opacity:0;}to{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(50px);}to{opacity:1;transform:translateY(0);}}
@keyframes slowZoom{from{transform:scale(1);}to{transform:scale(1.06);}}

h1,h2,h3{
font-family:"Playfair Display",serif;
font-weight:400;
}

img{max-width:100%;display:block;}
a{-webkit-tap-highlight-color:transparent;}

.page-transition{
position:fixed;
inset:0;
background:var(--navy);
z-index:99999;
transform:translateY(100%);
pointer-events:none;
transition:transform .75s cubic-bezier(.77,0,.175,1);
}

.page-transition.active{transform:translateY(0);}

.reveal{
opacity:0;
transform:translateY(45px);
transition:opacity .9s ease, transform .9s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

.delay-1{transition-delay:.12s;}
.delay-2{transition-delay:.24s;}
.delay-3{transition-delay:.36s;}

header{
position:absolute;
top:0;
left:0;
width:100%;
z-index:1000;
display:grid;
grid-template-columns:auto 1fr;
align-items:center;
gap:30px;
padding:34px 7%;
}

.logo{
color:white;
text-decoration:none;
font-size:24px;
letter-spacing:3px;
text-transform:uppercase;
white-space:nowrap;
transition:.35s ease;
}

.logo:hover{letter-spacing:4px;}
.logo span{color:var(--gold-light);}

nav{
display:flex;
justify-content:flex-end;
align-items:center;
gap:28px;
}

nav a{
color:white;
text-decoration:none;
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
white-space:nowrap;
transition:.3s;
position:relative;
}

nav a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0;
height:1px;
background:var(--gold-light);
transition:.35s;
}

nav a:hover{color:var(--gold-light);}
nav a:hover::after{width:100%;}

.hero{
min-height:72vh;
padding:180px 8% 90px;
background:
linear-gradient(rgba(18,27,63,.66),rgba(18,27,63,.66)),
var(--hero-image) center/cover;
color:white;
position:relative;
overflow:hidden;
display:flex;
align-items:flex-end;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:var(--hero-image) center/cover;
z-index:-2;
animation:slowZoom 18s ease-in-out infinite alternate;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(18,27,63,.66);
z-index:-1;
}

.hero-content{max-width:1050px;}

.back-link{
display:inline-block;
color:var(--gold-light);
text-decoration:none;
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:26px;
}

.hero h1{
font-size:clamp(38px,6vw,72px);
line-height:1.08;
letter-spacing:2px;
margin-bottom:24px;
animation:fadeUp 1s ease forwards;
}

.meta{
display:flex;
gap:18px;
flex-wrap:wrap;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
color:#f2f2f2;
}

.meta span{
border:1px solid rgba(255,255,255,.28);
padding:10px 14px;
background:rgba(255,255,255,.08);
}

section{padding:100px 8%;}

.detail-layout{
display:grid;
grid-template-columns:1.45fr .75fr;
gap:60px;
align-items:start;
}

.gallery{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:14px;
margin-bottom:50px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border:1px solid var(--border);
background:var(--soft);
}

.gallery img:first-child{
height:534px;
grid-row:span 2;
}

.content-block{margin-bottom:55px;}

.section-label{
font-size:12px;
letter-spacing:3px;
text-transform:uppercase;
color:var(--gold);
font-weight:600;
margin-bottom:14px;
}

.content-block h2{
font-size:42px;
color:var(--navy);
margin-bottom:20px;
line-height:1.2;
}

.content-block p{
color:var(--muted);
margin-bottom:16px;
}

.params{
border:1px solid var(--border);
background:white;
padding:34px;
display:grid;
gap:18px;
}

.param{
display:flex;
justify-content:space-between;
gap:20px;
border-bottom:1px dashed var(--border);
padding-bottom:12px;
}

.param:last-child{
border-bottom:none;
padding-bottom:0;
}

.param span:first-child{color:var(--muted);}

.param span:last-child{
color:var(--navy);
font-weight:600;
text-align:right;
}

.sidebar{
position:sticky;
top:30px;
display:grid;
gap:24px;
}

.card{
border:1px solid var(--border);
background:var(--soft);
padding:36px;
}

.price{
font-size:38px;
font-family:"Playfair Display",serif;
color:var(--navy);
margin-bottom:10px;
}

.card p{
color:var(--muted);
margin-bottom:18px;
}

.btn{
display:inline-block;
width:100%;
text-align:center;
padding:16px 28px;
background:var(--navy);
color:white;
text-decoration:none;
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
font-weight:600;
transition:.35s ease;
margin-top:10px;
}

.btn:hover{
background:var(--gold);
transform:translateY(-3px);
}

.btn-outline{
background:white;
color:var(--navy);
border:1px solid var(--border);
}

.contact-name{
font-size:28px;
color:var(--navy);
margin-bottom:12px;
}

.floating-contact{
position:fixed;
right:22px;
bottom:22px;
z-index:3000;
display:flex;
flex-direction:column;
gap:12px;
}

.floating-contact a{
width:56px;
height:56px;
border-radius:50%;
background:var(--navy);
color:white;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
font-size:22px;
box-shadow:0 14px 35px rgba(18,27,63,.25);
transition:.35s ease;
}

.floating-contact a:hover{
background:var(--gold);
transform:translateY(-4px);
}

footer{
background:var(--navy);
color:white;
text-align:center;
padding:28px;
font-size:13px;
letter-spacing:1px;
}

.loading{
padding:160px 8%;
text-align:center;
color:var(--muted);
}

@media(max-width:1100px){
header{
display:flex;
flex-direction:column;
gap:20px;
padding:28px 5%;
}

.logo{
font-size:21px;
text-align:center;
}

nav{
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

nav a{
font-size:11px;
letter-spacing:1.5px;
background:rgba(255,255,255,.12);
padding:7px 10px;
}

nav a::after{display:none;}

.detail-layout{
grid-template-columns:1fr;
}

.sidebar{position:static;}
}

@media(max-width:768px){
.hero{
min-height:620px;
padding:170px 6% 70px;
}

section{padding:75px 6%;}

.gallery{
grid-template-columns:1fr;
}

.gallery img,
.gallery img:first-child{
height:280px;
grid-row:auto;
}

.content-block h2{font-size:34px;}

.meta{gap:10px;}
.meta span{font-size:11px;}

.card{padding:30px 24px;}

.floating-contact{
right:15px;
bottom:15px;
}
}

@media(prefers-reduced-motion:reduce){
*{
animation:none!important;
transition:none!important;
scroll-behavior:auto!important;
}

.reveal{
opacity:1!important;
transform:none!important;
}
}
</style>
</head>

<body>

<div class="page-transition"></div>

<header>
<a href="index.html" class="logo transition-link" aria-label="Kamila Kopřivová – domů">Kamila <span>Kopřivová</span></a>

<nav aria-label="Hlavní navigace">
<a href="index.html" class="transition-link">Domů</a>
<a href="sluzby.html" class="transition-link">Služby</a>
<a href="nemovitosti.html" class="transition-link">Nemovitosti</a>
<a href="realizace.html" class="transition-link">Realizace</a>
<a href="oceneni-nemovitosti.html" class="transition-link">Ocenění</a>
<a href="reference.html" class="transition-link">Reference</a>
<a href="index.html#kontakt">Kontakt</a>
</nav>
</header>

<main id="app">
<div class="loading">Načítám detail nemovitosti...</div>
</main>

<div class="floating-contact">
<a href="tel:+420736167321" title="Zavolat" aria-label="Zavolat">☎</a>
<a href="mailto:koprivovakamila@gmail.com" title="E-mail" aria-label="Napsat e-mail">✉</a>
<a href="https://wa.me/420736167321" target="_blank" rel="noopener noreferrer" title="WhatsApp" aria-label="Otevřít WhatsApp">💬</a>
</div>

<footer>
© 2026 Kamila Kopřivová | Realitní makléřka
</footer>

<script>
const app = document.querySelector("#app");
const transition = document.querySelector(".page-transition");

function setupTransitionLinks(){
  const transitionLinks = document.querySelectorAll(".transition-link");

  transitionLinks.forEach(link => {
    link.onclick = e => {
      const href = link.getAttribute("href");

      if(
        !href ||
        href.startsWith("#") ||
        href.startsWith("mailto") ||
        href.startsWith("tel") ||
        href.startsWith("https://wa.me")
      ){
        return;
      }

      e.preventDefault();
      transition.classList.add("active");

      setTimeout(() => {
        window.location.href = href;
      }, 650);
    };
  });
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("active");
    }
  });
},{
  threshold:.15
});

function setupReveal(){
  document.querySelectorAll(".reveal").forEach(el => {
    observer.observe(el);
  });
}

function clean(value){
  return value ? String(value).trim() : "";
}

function escapeHTML(value){
  return clean(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function safeUrl(value){
  const url = clean(value);

  if(!url){
    return "";
  }

  if(
    url.startsWith("https://") ||
    url.startsWith("http://") ||
    url.startsWith("images/")
  ){
    return url;
  }

  return "";
}

function setMeta(name, content){
  const tag = document.querySelector(`meta[name="${name}"]`);
  if(tag) tag.setAttribute("content", content);
}

function setOg(property, content){
  const tag = document.querySelector(`meta[property="${property}"]`);
  if(tag) tag.setAttribute("content", content);
}

function formatPrice(item){
  if(item.priceText) return clean(item.priceText);
  if(item.cenaText) return clean(item.cenaText);

  if(item.price){
    const number = Number(item.price);

    if(!Number.isNaN(number)){
      return number.toLocaleString("cs-CZ") + " Kč";
    }

    return clean(item.price);
  }

  return "Cena u makléře";
}

function getLocation(item){
  const parts = [
    clean(item.city),
    clean(item.street)
  ].filter(Boolean);

  return parts.length ? parts.join(", ") : clean(item.region || "Olomoucký kraj");
}

function getImage(item){
  if(safeUrl(item.image)) return safeUrl(item.image);
  if(safeUrl(item.fotka)) return safeUrl(item.fotka);

  if(Array.isArray(item.gallery) && item.gallery.length && safeUrl(item.gallery[0])) return safeUrl(item.gallery[0]);
  if(Array.isArray(item.images) && item.images.length && safeUrl(item.images[0])) return safeUrl(item.images[0]);
  if(Array.isArray(item.fotky) && item.fotky.length && safeUrl(item.fotky[0])) return safeUrl(item.fotky[0]);

  return "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1600&auto=format&fit=crop";
}

function getImages(item){
  const sources = [];

  if(Array.isArray(item.gallery)) sources.push(...item.gallery);
  if(Array.isArray(item.images)) sources.push(...item.images);
  if(Array.isArray(item.fotky)) sources.push(...item.fotky);

  const cleaned = sources.map(safeUrl).filter(Boolean);

  return cleaned.length ? cleaned : [getImage(item)];
}

function getStatus(item){
  const status = clean(item.status).toLowerCase();
  const price = clean(item.price).toLowerCase();
  const type = clean(item.type).toLowerCase();

  if(status === "sold" || status === "realized") return "sold";
  if(price.includes("prodáno") || price.includes("prodano") || price.includes("pronajato")) return "sold";
  if(type.includes("prodáno") || type.includes("prodano") || type.includes("pronajato")) return "sold";

  return "active";
}

function getBackUrl(item){
  return getStatus(item) === "sold" ? "realizace.html" : "nemovitosti.html";
}

function getBackText(item){
  return getStatus(item) === "sold" ? "← Zpět na realizace" : "← Zpět na nabídku";
}

function renderDetail(item){
  const title = clean(item.title || item.nadpis_nemovitosti || "Detail nemovitosti");
  const description = clean(item.longDescription || item.description || item.popis_nemovitosti || "Detailní informace k této nemovitosti budou doplněny.");
  const location = getLocation(item);
  const image = getImage(item);
  const images = getImages(item);
  const price = formatPrice(item);
  const type = clean(item.type || "Nabídka");
  const estateType = clean(item.estateType || "Nemovitost");
  const backUrl = getBackUrl(item);
  const backText = getBackText(item);
  const pageTitle = title + " | Kamila Kopřivová";
  const shortDescription = description.length > 155 ? description.substring(0,155) + "..." : description;

  document.title = pageTitle;
  document.documentElement.style.setProperty("--hero-image", `url("${image}")`);

  setMeta("description", shortDescription);
  setOg("og:title", pageTitle);
  setOg("og:description", shortDescription);
  setOg("og:image", image);

  app.innerHTML = `
    <section class="hero">
      <div class="hero-content">
        <a href="${escapeHTML(backUrl)}" class="back-link transition-link">${escapeHTML(backText)}</a>
        <h1>${escapeHTML(title)}</h1>

        <div class="meta">
          <span>${escapeHTML(location)}</span>
          <span>${escapeHTML(estateType)}</span>
          <span>${escapeHTML(type)}</span>
        </div>
      </div>
    </section>

    <section>
      <div class="detail-layout">

        <div>

          <div class="gallery reveal">
            ${images.slice(0,5).map((img,index) => `
              <img src="${escapeHTML(img)}" alt="${escapeHTML(title)}" loading="${index === 0 ? "eager" : "lazy"}">
            `).join("")}
          </div>

          <div class="content-block reveal">
            <div class="section-label">Popis nemovitosti</div>
            <h2>Získejte veškeré potřebné informace</h2>
            <p>${escapeHTML(description)}</p>
          </div>

          <div class="content-block reveal">
            <div class="section-label">Parametry</div>
            <h2>Podrobnosti o nabídce</h2>

            <div class="params">
              <div class="param"><span>Lokalita</span><span>${escapeHTML(location)}</span></div>
              <div class="param"><span>Typ nabídky</span><span>${escapeHTML(type)}</span></div>
              <div class="param"><span>Druh nemovitosti</span><span>${escapeHTML(estateType)}</span></div>
              <div class="param"><span>Číslo nabídky</span><span>${escapeHTML(item.id || item.id_nabidka || "—")}</span></div>
              <div class="param"><span>Okres</span><span>${escapeHTML(item.district || "Olomouc")}</span></div>
              <div class="param"><span>Užitná plocha</span><span>${escapeHTML(item.usableArea || "—")}</span></div>
              <div class="param"><span>Plocha pozemku</span><span>${escapeHTML(item.plotArea || "—")}</span></div>
              <div class="param"><span>Stav</span><span>${escapeHTML(item.condition || "—")}</span></div>
              <div class="param"><span>Energetická třída</span><span>${escapeHTML(item.energyClass || "—")}</span></div>
              <div class="param"><span>Podlaží</span><span>${escapeHTML(item.floor || "—")}</span></div>
            </div>
          </div>

        </div>

        <aside class="sidebar">

          <div class="card reveal delay-1">
            <div class="section-label">Cena</div>
            <div class="price">${escapeHTML(price)}</div>
            <p>Pro více informací kontaktujte makléřku.</p>

            <a href="tel:+420736167321" class="btn">Zavolat</a>
            <a href="mailto:koprivovakamila@gmail.com?subject=${encodeURIComponent("Dotaz k nemovitosti: " + title)}" class="btn btn-outline">Napsat e-mail</a>
          </div>

          <div class="card reveal delay-2">
            <div class="section-label">Makléřka</div>
            <h3 class="contact-name">Ing. Kamila Kopřivová</h3>
            <p>Realitní makléřka pro Olomoucký kraj</p>
            <p>koprivovakamila@gmail.com</p>
            <p>+420 736 167 321</p>
          </div>

        </aside>

      </div>
    </section>
  `;

  setupTransitionLinks();
  setupReveal();
}

async function loadDetail(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if(!id){
    app.innerHTML = `
      <section class="loading">
        <h1>Chybí ID nemovitosti</h1>
        <p>Vraťte se prosím na přehled nemovitostí.</p>
        <br>
        <a href="nemovitosti.html" class="btn transition-link">Zpět na nabídku</a>
      </section>
    `;

    setupTransitionLinks();
    return;
  }

  try{
    const response = await fetch("/api/nemovitosti?id=" + encodeURIComponent(id));

    if(!response.ok){
      throw new Error("Detail se nepodařilo načíst");
    }

    const item = await response.json();

    if(!item || item.error){
      throw new Error("Nemovitost nebyla nalezena");
    }

    renderDetail(item);

  }catch(error){
    app.innerHTML = `
      <section class="loading">
        <h1>Nemovitost se nepodařilo načíst</h1>
        <p>Zkuste se vrátit na přehled nemovitostí.</p>
        <br>
        <a href="nemovitosti.html" class="btn transition-link">Zpět na nabídku</a>
      </section>
    `;

    setupTransitionLinks();
  }
}

setupTransitionLinks();
loadDetail();
</script>

</body>
</html>
