<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stránka nenalezena | Kamila Kopřivová</title>
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#121b3f">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--soft:#f7f5f0;--gold:#c8ab72;--gold-light:#eadcc0;--navy:#121b3f;--text:#2d2d2d;--muted:#777;--border:#ece6da;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:"Montserrat",Arial,Helvetica,sans-serif;background:var(--soft);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;text-align:center;}main{max-width:720px;background:white;border:1px solid var(--border);padding:56px 38px;box-shadow:0 24px 60px rgba(18,27,63,.08);}h1{font-family:"Playfair Display",Georgia,"Times New Roman",serif;color:var(--navy);font-size:clamp(38px,7vw,70px);font-weight:400;line-height:1.1;margin-bottom:18px;}p{color:var(--muted);margin-bottom:30px;line-height:1.7;}a{display:inline-block;background:var(--navy);color:white;text-decoration:none;padding:15px 28px;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:600;transition:.3s;}a:hover{background:var(--gold);transform:translateY(-3px);}


/* Marvonix responsive polish */
.phone-link{color:inherit;text-decoration:none;font-weight:600;}
.phone-link:hover{color:var(--gold);}
nav a,.btn,.clean-btn,.submit-btn,.hero-btn,.back,.filter-btn{white-space:normal;text-wrap:balance;}
p,h1,h2,h3,.section-title,.section-subtitle,.property h3,.property-content h3,.card p,.info p{overflow-wrap:break-word;word-break:normal;hyphens:none;}
@media(max-width:768px){
  header{padding-left:5%;padding-right:5%;}
  nav{gap:8px 10px;}
  nav a{font-size:11px;letter-spacing:1px;line-height:1.25;padding:8px 10px;text-align:center;}
  .logo{letter-spacing:1.8px;}
  .hero-content,.section-title,.section-subtitle{text-wrap:balance;}
  .btn,.clean-btn,.submit-btn,.hero-btn,.back,.filter-btn{letter-spacing:1.2px;line-height:1.35;min-height:44px;display:inline-flex;align-items:center;justify-content:center;text-align:center;}
  footer{font-size:12px;line-height:1.7;letter-spacing:.3px;padding:26px 6%;}
  .footer-link{display:inline-block;margin-top:8px;line-height:1.4;}
}
@media(max-width:420px){
  nav a{font-size:10px;letter-spacing:.8px;padding:7px 8px;}
  .btn,.clean-btn,.submit-btn,.hero-btn,.back,.filter-btn{font-size:11px;letter-spacing:1px;padding-left:16px;padding-right:16px;}
}


/* Zakaz nehezkeho deleni slov */
p,h1,h2,h3,a,span,button{hyphens:none;overflow-wrap:break-word;}
@media(max-width:520px){body{overflow-x:hidden;} nav a,.btn,.clean-btn,.submit-btn,.filter-btn{line-height:1.35;}}
</style>
</head>
<body>
<main>
<h1>Stránka nebyla nalezena</h1>
<p>Odkaz může být neplatný nebo byla stránka přesunuta. Vraťte se prosím na hlavní stránku.</p>
<a href="index.html">Zpět na web</a>
</main>
</body>
</html>
